<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAQ Chatbot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22263a;
      --accent:    #5b8dee;
      --accent2:   #7c3aed;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --bot-bg:    #1e293b;
      --user-bg:   linear-gradient(135deg,#5b8dee,#7c3aed);
      --radius:    14px;
      --font:      'Segoe UI', system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .wrapper {
      width: 100%;
      max-width: 780px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid #2d3148;
    }

    header .avatar {
      width: 44px; height: 44px;
      background: var(--user-bg);
      border-radius: 50%;
      display: grid; place-items: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    header h1 { font-size: 1.1rem; font-weight: 700; }
    header p  { font-size: 0.78rem; color: var(--muted); }

    .status-dot {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      margin-left: auto;
      box-shadow: 0 0 6px #22c55e;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; } 50% { opacity:.4; }
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid #2d3148;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 5px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 99px; }

    .msg {
      display: flex;
      gap: 10px;
      animation: fadeUp .25s ease both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(8px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: grid; place-items: center;
      font-size: 16px;
      flex-shrink: 0;
      align-self: flex-end;
    }
    .msg.bot  .msg-avatar { background: var(--surface2); }
    .msg.user .msg-avatar { background: var(--user-bg); }

    .bubble {
      max-width: 72%;
      padding: 11px 16px;
      border-radius: var(--radius);
      line-height: 1.6;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.bot  .bubble { background: var(--bot-bg); border-bottom-left-radius: 4px; }
    .msg.user .bubble {
      background: var(--user-bg);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .meta {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 4px;
    }

    #suggestions {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
    }
    #suggestions::-webkit-scrollbar { display: none; }

    .chip {
      flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid #2d3148;
      color: var(--text);
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: background .15s, border-color .15s;
      white-space: nowrap;
    }
    .chip:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

    .input-bar {
      display: flex;
      gap: 10px;
      background: var(--surface);
      border: 1px solid #2d3148;
      border-radius: var(--radius);
      padding: 10px 14px;
      align-items: center;
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 0.92rem;
      font-family: var(--font);
      resize: none;
      max-height: 120px;
      line-height: 1.5;
    }
    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      background: var(--user-bg);
      border: none;
      color: #fff;
      width: 40px; height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: grid; place-items: center;
      font-size: 18px;
      flex-shrink: 0;
      transition: opacity .15s, transform .1s;
    }
    #send-btn:hover  { opacity: .85; }
    #send-btn:active { transform: scale(.93); }

    .typing { display: flex; gap: 5px; align-items: center; padding: 8px 14px; }
    .typing span {
      width: 7px; height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce .8s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%         { transform: translateY(-6px); }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="avatar">🤖</div>
    <div>
      <h1>FAQ Chatbot</h1>
      <p>Python &amp; Tech Q&amp;A — powered by NLP</p>
    </div>
    <div class="status-dot" title="Online"></div>
  </header>

  <div id="chat">
    <div class="msg bot">
      <div class="msg-avatar">🤖</div>
      <div>
        <div class="bubble">Hello! 👋 I'm your FAQ assistant. Ask me anything about Python, programming, or general tech — I'll do my best to help!</div>
        <div class="meta">Just now</div>
      </div>
    </div>
  </div>

  <div id="suggestions"></div>

  <div class="input-bar">
    <textarea id="user-input" rows="1" placeholder="Ask a question…"></textarea>
    <button id="send-btn" title="Send">➤</button>
  </div>

</div>

<script>
  const chatEl   = document.getElementById('chat');
  const inputEl  = document.getElementById('user-input');
  const sendBtn  = document.getElementById('send-btn');
  const suggsEl  = document.getElementById('suggestions');

  fetch('/faqs')
    .then(r => r.json())
    .then(faqs => {
      const sample = faqs.sort(() => Math.random() - .5).slice(0, 8);
      sample.forEach(f => {
        const chip = document.createElement('button');
        chip.className = 'chip';
        chip.textContent = f.question;
        chip.onclick = () => sendQuestion(f.question);
        suggsEl.appendChild(chip);
      });
    });

  function timestamp() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function addMessage(text, role, meta = '') {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const avatar = role === 'bot' ? '🤖' : '🧑';
    div.innerHTML = `
      <div class="msg-avatar">${avatar}</div>
      <div>
        <div class="bubble">${escHtml(text)}</div>
        ${meta ? `<div class="meta">${escHtml(meta)}</div>` : ''}
      </div>`;
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
    return div;
  }

  function addTyping() {
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'typing-indicator';
    div.innerHTML = `<div class="msg-avatar">🤖</div>
      <div class="bubble typing"><span></span><span></span><span></span></div>`;
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function removeTyping() {
    document.getElementById('typing-indicator')?.remove();
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
  }

  async function sendQuestion(question) {
    question = question.trim();
    if (!question) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    addMessage(question, 'user', timestamp());
    addTyping();

    try {
      const res  = await fetch('/ask', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ question }),
      });
      const data = await res.json();
      removeTyping();

      const meta = data.found
        ? `Matched: "${data.matched_question}" · Confidence: ${(data.confidence * 100).toFixed(1)}% · ${timestamp()}`
        : timestamp();
      addMessage(data.answer, 'bot', meta);
    } catch {
      removeTyping();
      addMessage('⚠️ Could not reach the server. Make sure app.py is running.', 'bot', timestamp());
    }
  }

  sendBtn.addEventListener('click', () => sendQuestion(inputEl.value));

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendQuestion(inputEl.value);
    }
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = inputEl.scrollHeight + 'px';
  });
</script>
</body>
</html>
